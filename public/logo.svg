<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="back-grad" x1="90" y1="110" x2="430" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7e22ce"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="front-grad" x1="70" y1="70" x2="442" y2="442" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="highlight-grad" cx="0.5" cy="0.15" r="0.55" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="front-clip">
      <rect x="70" y="70" width="372" height="372" rx="86"/>
    </clipPath>
    <filter id="drop-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="16" flood-color="#4a044e" flood-opacity="0.35"/>
    </filter>
    <filter id="glyph-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4a044e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- back layer, peeking out lower-right, echoing the stacked-card look -->
  <rect x="90" y="110" width="340" height="340" rx="80" fill="url(#back-grad)" opacity="0.8"/>

  <!-- front layer with shadow lifting it off the page -->
  <g filter="url(#drop-shadow)">
    <rect x="70" y="70" width="372" height="372" rx="86" fill="url(#front-grad)"/>
  </g>

  <!-- glossy highlight, clipped to the front squircle -->
  <rect x="70" y="70" width="372" height="372" rx="86" fill="url(#highlight-grad)" clip-path="url(#front-clip)"/>

  <!-- the I glyph, embossed with a soft shadow -->
  <path
    filter="url(#glyph-shadow)"
    fill="#ffffff"
    d="M176.64,136.79h158.72v33.72h-158.72v-33.72ZM176.64,341.15h158.72v34.06h-158.72v-34.06ZM236.93,151.43h38.15v207.77h-38.15v-207.77Z"
  />
</svg>
